<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkBio Premium</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-y: auto;
    }
    /* 
      Contêiner relativo que acompanha o tamanho exato da imagem.
      Garante que as áreas clicáveis nunca mudem de posição.
    */
    .container {
      position: relative;
      width: 100%;
      max-width: 480px;
    }
    .background-img {
      display: block;
      width: 100%;
      height: auto;
    }
    .hotspot {
      position: absolute;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Substitua o src pela sua imagem local -->
    <img src="assets/bg.png" alt="Link Bio" class="background-img" />
    
      <a 
        href="https://wa.link/ttag2w" target="_blank" rel="noopener noreferrer"
        class="hotspot"
        style="left: 14.250000000000002%; top: 63.150000000000006%; width: 71.5%; height: 8.3%;"
        aria-label="Botão Inteligente 5"
      ></a>
  </div>
</body>
</html>
